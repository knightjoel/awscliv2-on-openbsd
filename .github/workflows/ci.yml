name: CI

on:
  push:
    branches-ignore:
      - main

env:
  OBSD_MIRROR: https://cdn.openbsd.org/pub/OpenBSD/7.4
  OBSD_VERSION: "7.4"
  PKG_DEPS_GENERAL: cmake ninja python
  PKG_DEPS_CLI: |
    py3-colorama py3-docutils py3-cryptography py3-ruamel.yaml py3-ruamel.yaml.clib
    py3-prompt_toolkit py3-distro py3-dateutil py3-jmespath py3-urllib3

jobs:
  build:
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v4
      - name: Build
        uses: cross-platform-actions/action@v0.21.1
        env:
          PORTSDIR: /home/runner/ports
        with:
          operating_system: openbsd
          architecture: x86-64
          version: "${{ env.OBSD_VERSION }}"
          environment_variables: PORTSDIR
          shell: bash
          sync_files: runner-to-vm
          run: |
            pwd
            # /Users/runner/work/awscliv2-on-openbsd/awscliv2-on-openbsd
            ls -l
            sudo pkg_add -Ix ${{ env.PKG_DEPS_GENERAL }} ${{ env.PKG_DEPS_CLI }}
            cd ~
            ftp -ao - -V -M ${{ env.OBSD_MIRROR }}/ports.tar.gz | tar zxphf -
            mv ~/work/awscliv2-on-openbsd/awscliv2-on-openbsd/ports/sysutils/awscliv2 ~/ports/sysutils
            mv ~/work/awscliv2-on-openbsd/awscliv2-on-openbsd/ports/devel/py-awscrt ~/ports/devel
            cd ~/ports/sysutils/awscliv2
            make makesum
            make update-plist
            make package
            cd ~/ports/devel/py-awscrt
            make makesum
            make update-plist
            make package

